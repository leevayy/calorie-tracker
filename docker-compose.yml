services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-calorie_tracker}
      POSTGRES_USER: ${POSTGRES_USER:-calorie_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-calorie_pass}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-calorie_user} -d ${POSTGRES_DB:-calorie_tracker}",
        ]
      interval: 5s
      timeout: 5s
      retries: 12

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - backend/.env
    ports:
      - "3000:3000"

volumes:
  pg_data:
