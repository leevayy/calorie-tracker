<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <title>Calorie Tracker — Error</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #fafafa;
        --fg: #0a0a0a;
        --muted: #737373;
        --border: #e5e5e5;
        --accent: #0ea5e9;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0a0a0a;
          --fg: #fafafa;
          --muted: #a3a3a3;
          --border: #262626;
          --accent: #38bdf8;
        }
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: var(--bg);
        color: var(--fg);
        line-height: 1.5;
      }
      main {
        max-width: 24rem;
        text-align: center;
      }
      h1 {
        font-size: 1.25rem;
        font-weight: 600;
        margin: 0 0 0.5rem;
      }
      p {
        margin: 0 0 1.25rem;
        color: var(--muted);
        font-size: 0.9375rem;
      }
      a {
        display: inline-block;
        color: var(--accent);
        text-decoration: none;
        font-weight: 500;
        padding: 0.5rem 1rem;
        border: 1px solid var(--border);
        border-radius: 0.5rem;
      }
      a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Page not found</h1>
      <p>
        The page you requested is missing or the link is wrong. You can return to
        the app and try again.
      </p>
      <a href="/">Back to Calorie Tracker</a>
    </main>
  </body>
</html>
