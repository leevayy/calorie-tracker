# Deploy static frontend to S3-compatible storage; optionally refresh API on a VM via SSH.
#
# Secrets (static job — required for deploy-static to succeed):
#   VITE_API_BASE_URL     — public API origin, no trailing slash (e.g. https://api.example.com)
#   YC_S3_BUCKET          — bucket name
#   YC_S3_ENDPOINT        — e.g. https://storage.yandexcloud.net
#   YC_S3_REGION          — e.g. ru-central1
#   AWS_ACCESS_KEY_ID     — static key id (or Yandex S3 access key)
#   AWS_SECRET_ACCESS_KEY — static secret
# Optional:
#   YC_S3_PREFIX          — key prefix inside bucket (no leading/trailing slashes)
#
# Variables / secrets (VM job — enable with repository variable ENABLE_VM_DEPLOY=true):
#   SSH_HOST, SSH_USER, SSH_PRIVATE_KEY
#   VM_DEPLOY_PATH (optional repository variable; defaults to /opt/calorie-tracker on the server)

name: Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-static:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies and build frontend
        working-directory: frontend
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
        run: npm ci && npm run build

      - name: Install AWS CLI v2
        run: |
          curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o awscliv2.zip
          unzip -q awscliv2.zip
          sudo ./aws/install --update

      - name: Sync dist to object storage
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_EC2_METADATA_DISABLED: "true"
        run: |
          set -euo pipefail
          BUCKET="${{ secrets.YC_S3_BUCKET }}"
          ENDPOINT="${{ secrets.YC_S3_ENDPOINT }}"
          REGION="${{ secrets.YC_S3_REGION }}"
          PREFIX_RAW="${{ secrets.YC_S3_PREFIX }}"
          if [ -z "$BUCKET" ]; then echo "YC_S3_BUCKET secret is required"; exit 1; fi
          if [ -z "$ENDPOINT" ]; then echo "YC_S3_ENDPOINT secret is required"; exit 1; fi
          if [ -z "$REGION" ]; then echo "YC_S3_REGION secret is required"; exit 1; fi
          PREFIX="${PREFIX_RAW:-}"
          PREFIX="${PREFIX#/}"
          PREFIX="${PREFIX%/}"
          if [ -n "$PREFIX" ]; then
            DEST="s3://${BUCKET}/${PREFIX}/"
          else
            DEST="s3://${BUCKET}/"
          fi
          aws --endpoint-url "$ENDPOINT" s3 sync frontend/dist/ "$DEST" --region "$REGION"

  deploy-api:
    needs: deploy-static
    # Static deploy is allowed to fail (e.g. build error) without blocking backend rollout.
    if: always() && vars.ENABLE_VM_DEPLOY == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Pull and restart stack on VM
        uses: appleboy/ssh-action@v1.2.5
        env:
          VM_DEPLOY_PATH: ${{ vars.VM_DEPLOY_PATH }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: VM_DEPLOY_PATH
          script_stop: true
          script: |
            set -euo pipefail
            cd "${VM_DEPLOY_PATH:-/opt/calorie-tracker}"
            git fetch origin main
            git checkout main
            git pull origin main
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
